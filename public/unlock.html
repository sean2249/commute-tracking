<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Unlock · Commute</title>
  <meta name="theme-color" content="#FAFAF9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/unlock.css">
</head>
<body class="unlock-page">
  <form id="unlock-form" class="container" autocomplete="on">
    <h1>Commute</h1>
    <p class="sub">Enter secret to unlock</p>
    <input id="secret-input" type="password" autocomplete="current-password" autofocus required placeholder="••••••••" aria-label="App secret">
    <button type="submit">Unlock</button>
    <div id="error-slot" class="error-slot" aria-live="polite"></div>
  </form>

  <script type="module" src="/js/unlock-page.js"></script>
</body>
</html>
