<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Unlock · Commute</title>
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/unlock.css">
</head>
<body class="unlock-page">
  <form id="unlock-form" class="container" autocomplete="on">
    <h1>Commute</h1>
    <p class="sub">Enter secret to unlock</p>
    <input id="secret-input" type="password" autocomplete="current-password" autofocus required placeholder="••••••••" aria-label="App secret">
    <button type="submit">Unlock</button>
    <div id="error-slot" class="error-slot" aria-live="polite"></div>
  </form>

  <script type="module" src="js/unlock-page.js"></script>
</body>
</html>
