<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Charts · Commute</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/charts.css">
</head>
<body>
  <header class="app-header">
    <a class="back" href="index.html" aria-label="Back" data-icon="chevronLeft" data-size="22"></a>
    <h1>Charts</h1>
    <span style="width:44px"></span>
  </header>

  <div class="aggregate-row">
    <div class="aggregate-cell"><div id="agg-events" class="num">—</div><div class="label">Events</div></div>
    <div class="aggregate-cell"><div id="agg-paired" class="num">—</div><div class="label">Paired</div></div>
    <div class="aggregate-cell"><div id="agg-median" class="num">—</div><div class="label">Median</div></div>
    <div class="aggregate-cell"><div id="agg-missing" class="num">—</div><div class="label">Missing alight</div></div>
  </div>

  <p class="charts-intro">每張圖的 Y 軸都是通勤時間（duration），呈現各因素對通勤時間的整體影響。太陽色＝上班、黃泥色＝下班。</p>

  <div class="charts-grid">
    <section id="section-weekday" class="chart-section">
      <header>
        <h2><span data-icon="barChart" data-size="16" class="icon-sm"></span> Duration by weekday</h2>
        <span id="n-weekday" class="n-count">n=0</span>
      </header>
      <span class="chart-low-sample-banner" style="display:none">樣本偏少（n&lt;10），請謹慎解讀</span>
      <div class="chart-wrap"><canvas id="chart-weekday"></canvas></div>
    </section>

    <section id="section-weather" class="chart-section">
      <header>
        <h2><span data-icon="barChart" data-size="16" class="icon-sm"></span> Duration by weather</h2>
        <span id="n-weather" class="n-count">n=0</span>
      </header>
      <span class="chart-low-sample-banner" style="display:none">樣本偏少（n&lt;10），請謹慎解讀</span>
      <div class="chart-wrap"><canvas id="chart-weather"></canvas></div>
    </section>

    <section id="section-boarding" class="chart-section">
      <header>
        <h2><span data-icon="barChart" data-size="16" class="icon-sm"></span> Duration by boarding time</h2>
        <span id="n-boarding" class="n-count">n=0</span>
      </header>
      <span class="chart-low-sample-banner" style="display:none">樣本偏少（n&lt;10），請謹慎解讀</span>
      <div class="chart-wrap"><canvas id="chart-boarding"></canvas></div>
    </section>

    <section id="section-temp" class="chart-section">
      <header>
        <h2><span data-icon="barChart" data-size="16" class="icon-sm"></span> Duration by temperature</h2>
        <span id="n-temp" class="n-count">n=0</span>
      </header>
      <span class="chart-low-sample-banner" style="display:none">樣本偏少（n&lt;10），請謹慎解讀</span>
      <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="index.html" aria-label="Home" data-icon="home" data-size="22"></a>
    <a href="log.html" aria-label="Log" data-icon="list" data-size="22"></a>
    <a href="charts.html" aria-current="page" aria-label="Charts" data-icon="barChart" data-size="22"></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/charts-page.js"></script>
</body>
</html>
