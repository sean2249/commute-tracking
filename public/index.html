<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Commute</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <header class="app-header">
    <h1>Commute</h1>
    <a class="gear" href="unlock.html" aria-label="Settings" data-icon="gear" data-size="20"></a>
  </header>

  <section id="status-strip" class="status-strip" data-state="empty" aria-live="polite">
    <img class="bus" src="assets/bus-right-512.png" alt="" aria-hidden="true">
    <div>尚無紀錄。按下方上車鍵開始。</div>
  </section>

  <div class="entry-buttons">
    <button class="primary-action" id="primary-action" type="button" aria-live="polite">
      <span class="primary-action__stub" aria-hidden="true">
        <span class="primary-action__stub-direction"></span>
        <span class="primary-action__icon"></span>
        <span class="primary-action__serial"></span>
      </span>
      <span class="primary-action__main">
        <span class="primary-action__header" aria-hidden="true">
          <span class="primary-action__brand">PASS · 通勤券</span>
          <span class="primary-action__class">ONE WAY</span>
        </span>
        <span class="primary-action__label"></span>
        <span class="primary-action__footer" aria-hidden="true">
          <span class="primary-action__route"></span>
          <span class="primary-action__date"></span>
        </span>
      </span>
    </button>
    <p class="primary-action__hint" id="primary-action-hint"></p>
  </div>

  <section class="recent-section">
    <h2>Recent</h2>
    <ul id="recent-list" class="recent-list">
      <li class="empty">載入中…</li>
    </ul>
  </section>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="index.html" aria-current="page" aria-label="Home" data-icon="home" data-size="22"></a>
    <a href="log.html" aria-label="Log" data-icon="list" data-size="22"></a>
    <a href="charts.html" aria-label="Charts" data-icon="barChart" data-size="22"></a>
  </nav>

  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/index-page.js"></script>
</body>
</html>
