<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Commute</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/scene.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash-sign">
      <span class="splash-stop"></span>
      <span class="splash-name">Commute</span>
      <span class="splash-cn">慢城小站</span>
    </div>
    <span class="splash-hand">opening up…</span>
  </div>

  <div class="pull-indicator" id="pull-indicator" aria-hidden="true">
    <img src="assets/bus-right-512.png" alt="">
    <span class="pull-dots">···</span>
  </div>

  <header class="app-header">
    <h1>Commute</h1>
    <a class="gear" href="settings.html" aria-label="Settings" data-icon="gear" data-size="20"></a>
  </header>

  <!-- Pastoral scene: A (morning wait) / B (on the road, bus lurches) / C (evening) -->
  <div class="scene" id="scene" data-state="A" data-tod="day" aria-hidden="true">
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="hill h1"></div>
    <div class="hill h2"></div>
    <div class="ground"></div>
    <div class="office" aria-hidden="true"></div>
    <div class="tree t1"></div>
    <div class="tree t2"></div>
    <div class="house" aria-hidden="true"></div>
    <div class="stopsign-mini" aria-hidden="true"></div>
    <div class="master" aria-hidden="true"></div>
    <div class="road"></div>
    <img class="bus" id="scene-bus" src="assets/bus-right-512.png" alt="" aria-hidden="true">
    <span class="scene-caption" id="scene-caption"></span>
  </div>

  <section id="status-strip" class="status-strip" data-state="empty" aria-live="polite">
    <div>早安。準備好就按下方上車。</div>
  </section>

  <div class="entry-buttons">
    <button class="primary-action" id="primary-action" type="button" aria-live="polite">
      <span class="pas-body">
        <span class="pas-meta" aria-hidden="true">
          <span class="pas-date" id="pa-date"></span>
          <span class="pas-verb" id="pa-verb"></span>
        </span>
        <span class="pas-stations" aria-hidden="true">
          <span class="pas-stn">
            <span class="pas-cn" id="pa-from-cn"></span>
            <span class="pas-en" id="pa-from-en"></span>
          </span>
          <span class="pas-arrow">→</span>
          <span class="pas-stn">
            <span class="pas-cn" id="pa-to-cn"></span>
            <span class="pas-en" id="pa-to-en"></span>
          </span>
        </span>
      </span>
      <span class="pas-punch" aria-hidden="true">
        <span class="pas-hole"></span>
        <span class="pas-glyph" id="pa-glyph"></span>
        <span class="pas-ticks" id="pa-ticks"></span>
      </span>
      <span class="pas-stamp" id="pa-stamp" aria-hidden="true"></span>
    </button>
    <p class="primary-action__hint" id="primary-action-hint"></p>
  </div>

  <section class="recent-section">
    <h2>Recent</h2>
    <ul id="recent-list" class="recent-list">
      <li class="empty">載入中…</li>
    </ul>
  </section>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="index.html" aria-current="page" aria-label="Home" data-icon="home" data-size="22"></a>
    <a href="log.html" aria-label="Log" data-icon="list" data-size="22"></a>
    <a href="charts.html" aria-label="Charts" data-icon="barChart" data-size="22"></a>
  </nav>

  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/index-page.js"></script>
</body>
</html>
