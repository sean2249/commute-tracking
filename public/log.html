<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Log · Commute</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/log.css">
</head>
<body>
  <header class="app-header">
    <a class="back" href="index.html" aria-label="Back" data-icon="chevronLeft" data-size="22"></a>
    <h1>Log</h1>
    <span style="width:44px"></span>
  </header>

  <div id="filter-chips" class="filter-chips">
    <div class="filter-group">
      <button class="chip" type="button" data-group="status" data-value="" aria-pressed="true">All</button>
      <button class="chip" type="button" data-group="status" data-value="paired" aria-pressed="false">Paired</button>
      <button class="chip" type="button" data-group="status" data-value="open" aria-pressed="false">Open</button>
    </div>
    <div class="filter-group">
      <button class="chip" type="button" data-group="direction" data-value="to_work" aria-pressed="false">↑ Work</button>
      <button class="chip" type="button" data-group="direction" data-value="from_work" aria-pressed="false">↓ Home</button>
    </div>
    <div class="filter-group">
      <button class="chip" type="button" data-group="weather" data-value="clear" aria-pressed="false">Clear</button>
      <button class="chip" type="button" data-group="weather" data-value="cloudy" aria-pressed="false">Cloudy</button>
      <button class="chip" type="button" data-group="weather" data-value="rain" aria-pressed="false">Rain</button>
    </div>
  </div>

  <div class="log-header">
    <span>day</span>
    <span>morning</span>
    <span>evening</span>
  </div>
  <ul id="log-list" class="log-list">
    <li class="skeleton-row"><span class="skeleton" style="display:block;height:18px;width:90%"></span></li>
  </ul>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="index.html" aria-label="Home" data-icon="home" data-size="22"></a>
    <a href="log.html" aria-current="page" aria-label="Log" data-icon="list" data-size="22"></a>
    <a href="charts.html" aria-label="Charts" data-icon="barChart" data-size="22"></a>
  </nav>

  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/log-page.js"></script>
</body>
</html>
