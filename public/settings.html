<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Settings · Commute</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2EBD3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F2940" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <header class="app-header">
    <a class="back" href="index.html" aria-label="Back" data-icon="chevronLeft" data-size="22"></a>
    <h1>Settings</h1>
    <span style="width:44px"></span>
  </header>

  <form id="settings-form" class="settings">
    <fieldset class="set-group">
      <legend>車站 · Stations</legend>
      <div class="set-row">
        <label>住所(中)<input type="text" id="home-cn" maxlength="6" autocomplete="off"></label>
        <label>Home (EN)<input type="text" id="home-en" maxlength="10" autocomplete="off"></label>
      </div>
      <div class="set-row">
        <label>公司(中)<input type="text" id="office-cn" maxlength="6" autocomplete="off"></label>
        <label>Office (EN)<input type="text" id="office-en" maxlength="10" autocomplete="off"></label>
      </div>
    </fieldset>

    <fieldset class="set-group">
      <legend>提醒 · Reminders</legend>
      <div class="set-row">
        <label>提醒時間(分)<input type="number" id="remind-min" min="1" max="600" inputmode="numeric"></label>
        <label>捨棄時間(分)<input type="number" id="discard-min" min="1" max="1440" inputmode="numeric"></label>
      </div>
      <p class="set-note">上車後超過「提醒時間」會提醒按下車;超過「捨棄時間」會自動捨棄未配對的上車。</p>
    </fieldset>

    <button type="submit" class="set-save">儲存</button>
    <div id="set-status" class="set-status" aria-live="polite"></div>

    <a class="set-link" href="unlock.html">重新輸入 secret</a>
  </form>

  <nav class="bottom-nav" aria-label="Primary">
    <a href="index.html" aria-label="Home" data-icon="home" data-size="22"></a>
    <a href="log.html" aria-label="Log" data-icon="list" data-size="22"></a>
    <a href="charts.html" aria-label="Charts" data-icon="barChart" data-size="22"></a>
  </nav>

  <script type="module" src="js/pwa.js"></script>
  <script type="module" src="js/settings-page.js"></script>
</body>
</html>
